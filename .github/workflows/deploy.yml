name: Deploy to GitHub Pages

# Runs on every push to master → the live site updates automatically.
on:
  push:
    branches: [master]
  workflow_dispatch:        # also lets you trigger a deploy manually from the Actions tab

# Permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer push cancels an in-flight one
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site (whole repo root — it's a static site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
